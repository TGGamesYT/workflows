name: Build Minecraft Mod

on:
  workflow_call:

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      name: ${{ steps.mod_info.outputs.name }}
      version: ${{ steps.mod_info.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
      multiloader: ${{ steps.detect.outputs.multiloader }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify this is a Minecraft mod
        id: detect
        run: |
          MANIFESTS=$(find . -maxdepth 5 \
            \( -name "fabric.mod.json" \
            -o -name "quilt.mod.json" \
            -o -name "mods.toml" \
            -o -name "neoforge.mods.toml" \) \
            -not -path "*/build/*" \
            -not -path "*/.gradle/*" \
            -not -path "*/run/*" \
            2>/dev/null)

          if [ -z "$MANIFESTS" ]; then
            echo "::error::This does not appear to be a Minecraft mod."
            echo "No loader manifest found anywhere in the project."
            exit 1
          fi

          echo "Found manifests:"
          echo "$MANIFESTS"

          MULTILOADER="false"
          while IFS= read -r m; do
            rel="${m#./}"
            top="${rel%%/*}"
            case "$top" in
              fabric|forge|neoforge|quilt|fabric-loader)
                MULTILOADER="true"
                break
                ;;
            esac
          done <<< "$MANIFESTS"

          echo "multiloader=$MULTILOADER" >> $GITHUB_OUTPUT
          if [ "$MULTILOADER" = "true" ]; then
            echo "Detected multi-loader mod project"
          else
            echo "Detected single-loader mod project"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Read mod info from gradle files
        id: mod_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Look up a key in a gradle.properties-style file, returning its value (or empty).
          lookup_in_props() {
            local key="$1"
            local file="$2"
            [ -f "$file" ] || return
            grep "^${key}[[:space:]]*=" "$file" 2>/dev/null \
              | head -n1 \
              | cut -d'=' -f2- \
              | tr -d ' \r'
          }

          # Look up a key, first in the gradle file's own dir, then walking up to repo root.
          lookup_key() {
            local key="$1"
            local gradle_file="$2"
            local dir
            dir=$(dirname "$gradle_file")
            while :; do
              local v
              v=$(lookup_in_props "$key" "$dir/gradle.properties")
              if [ -n "$v" ]; then
                echo "$v"
                return
              fi
              [ "$dir" = "." ] || [ "$dir" = "/" ] && return
              dir=$(dirname "$dir")
              [ -z "$dir" ] || [ "$dir" = "." ] && {
                v=$(lookup_in_props "$key" "gradle.properties")
                [ -n "$v" ] && echo "$v"
                return
              }
            done
          }

          # Extract a field from a build.gradle. Returns one of:
          #   LITERAL:<value>   -> hardcoded string
          #   KEY:<key>         -> reference to a gradle.properties key
          #   (empty)           -> field not found
          extract_field() {
            local field_pattern="$1"
            local file="$2"

            local line
            line=$(grep -E "^[[:space:]]*(${field_pattern})[[:space:]]*=" "$file" 2>/dev/null | head -n1)
            [ -z "$line" ] && return

            # Literal string: archivesBaseName = "foo"
            local literal
            literal=$(echo "$line" | sed -nE "s/^[[:space:]]*(${field_pattern})[[:space:]]*=[[:space:]]*[\"']([^\"']+)[\"'].*/\2/p")
            if [ -n "$literal" ]; then
              echo "LITERAL:$literal"
              return
            fi

            # Identifier: archivesBaseName = archives_base_name (or project.archives_base_name)
            local key
            key=$(echo "$line" | sed -nE "s/^[[:space:]]*(${field_pattern})[[:space:]]*=[[:space:]]*(project\.)?([A-Za-z_][A-Za-z0-9_]*).*/\3/p")
            [ -n "$key" ] && echo "KEY:$key"
          }

          # Resolve a field across candidate gradle files.
          # On KEY match, looks up value in gradle.properties files starting from the gradle file's dir.
          resolve_field() {
            local field_pattern="$1"
            shift
            local files=("$@")

            for f in "${files[@]}"; do
              [ -f "$f" ] || continue
              local result
              result=$(extract_field "$field_pattern" "$f")
              if [ -n "$result" ]; then
                if [[ "$result" == LITERAL:* ]]; then
                  echo "${result#LITERAL:}"
                  return
                elif [[ "$result" == KEY:* ]]; then
                  local k="${result#KEY:}"
                  local v
                  v=$(lookup_key "$k" "$f")
                  if [ -n "$v" ]; then
                    echo "$v"
                    return
                  fi
                fi
              fi
            done
          }

          # Also remember which file/key gave us the version, so we can bump the right place later.
          locate_version_source() {
            local files=("$@")
            for f in "${files[@]}"; do
              [ -f "$f" ] || continue
              local result
              result=$(extract_field "version" "$f")
              if [[ "$result" == KEY:* ]]; then
                local k="${result#KEY:}"
                local dir
                dir=$(dirname "$f")
                while :; do
                  if [ -f "$dir/gradle.properties" ] && grep -q "^${k}[[:space:]]*=" "$dir/gradle.properties"; then
                    echo "$dir/gradle.properties:$k"
                    return
                  fi
                  [ "$dir" = "." ] && {
                    [ -f "gradle.properties" ] && grep -q "^${k}[[:space:]]*=" "gradle.properties" && echo "gradle.properties:$k"
                    return
                  }
                  dir=$(dirname "$dir")
                  [ -z "$dir" ] && return
                done
              fi
            done
          }

          # Subprojects first (multi-loader puts the real config there), root last.
          CANDIDATES=()
          for d in fabric neoforge forge quilt common .; do
            for ext in build.gradle build.gradle.kts; do
              [ -f "$d/$ext" ] && CANDIDATES+=("$d/$ext")
            done
          done

          if [ ${#CANDIDATES[@]} -eq 0 ]; then
            echo "::error::No build.gradle files found"
            exit 1
          fi

          echo "Searching gradle files: ${CANDIDATES[*]}"

          BASE_VERSION=$(resolve_field "version" "${CANDIDATES[@]}")
          NAME=$(resolve_field "archivesName|archivesBaseName|archives_base_name" "${CANDIDATES[@]}")

          # Last-resort fallback to common keys in any gradle.properties (root + subdirs)
          if [ -z "$BASE_VERSION" ]; then
            for props in gradle.properties */gradle.properties; do
              [ -f "$props" ] || continue
              for k in mod_version version mcef_version; do
                v=$(lookup_in_props "$k" "$props")
                if [ -n "$v" ]; then BASE_VERSION="$v"; break 2; fi
              done
            done
          fi
          if [ -z "$NAME" ]; then
            for props in gradle.properties */gradle.properties; do
              [ -f "$props" ] || continue
              for k in archives_base_name mod_id; do
                v=$(lookup_in_props "$k" "$props")
                if [ -n "$v" ]; then NAME="$v"; break 2; fi
              done
            done
          fi

          if [ -z "$NAME" ] || [ -z "$BASE_VERSION" ]; then
            echo "::error::Failed to resolve mod name/version"
            echo "  NAME='$NAME'"
            echo "  VERSION='$BASE_VERSION'"
            exit 1
          fi

          echo "Base version: $BASE_VERSION"
          echo "Mod name: $NAME"

          # Locate where to bump the version (which gradle.properties + which key)
          VERSION_SOURCE=$(locate_version_source "${CANDIDATES[@]}")
          echo "Version source: ${VERSION_SOURCE:-(unknown)}"

          VERSION="$BASE_VERSION"
          i=1
          while gh release view "$VERSION" >/dev/null 2>&1; do
            VERSION="${BASE_VERSION}.${i}"
            i=$((i+1))
          done

          echo "Resolved free version: $VERSION"

          if [ "$VERSION" != "$BASE_VERSION" ]; then
            if [ -n "$VERSION_SOURCE" ]; then
              VS_FILE="${VERSION_SOURCE%%:*}"
              VS_KEY="${VERSION_SOURCE##*:}"
              echo "Bumping ${VS_KEY} in ${VS_FILE}: $BASE_VERSION -> $VERSION"
              sed -i -E "s|^(${VS_KEY}[[:space:]]*=[[:space:]]*).*|\1${VERSION}|" "$VS_FILE"
            else
              # Couldn't locate exact source; try common keys in root
              BUMPED=0
              for k in mod_version mcef_version version; do
                if grep -q "^${k}[[:space:]]*=[[:space:]]*${BASE_VERSION}\b" gradle.properties 2>/dev/null; then
                  echo "Bumping ${k} in gradle.properties: $BASE_VERSION -> $VERSION"
                  sed -i -E "s|^(${k}[[:space:]]*=[[:space:]]*).*|\1${VERSION}|" gradle.properties
                  BUMPED=1
                  break
                fi
              done
              if [ "$BUMPED" -eq 0 ]; then
                echo "::warning::Could not locate version source to bump; tag will be $VERSION but build may use $BASE_VERSION"
              fi
            fi
          fi

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: echo "tag=${{ steps.mod_info.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Read Gradle version from wrapper
        id: gradle_ver
        run: |
          FALLBACK="9.2.1"
          PROPS="gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$PROPS" ]; then
            VER=$(grep "^distributionUrl" "$PROPS" | sed -E 's/.*gradle-([0-9]+\.[0-9]+(\.[0-9]+)?)-.*/\1/')
            [ -z "$VER" ] && VER="$FALLBACK"
          else
            VER="$FALLBACK"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Using Gradle $VER"

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: ${{ steps.gradle_ver.outputs.version }}

      - name: Build mod
        run: gradle build

      - name: Collect built jars
        id: jars
        run: |
          NAME="${{ steps.mod_info.outputs.name }}"
          VERSION="${{ steps.mod_info.outputs.version }}"
          MULTI="${{ steps.detect.outputs.multiloader }}"

          mkdir -p collected-jars

          # For multi-loader, the NAME we resolved (e.g. "mcef-fabric") may only match
          # one loader's jars. Also accept other loader-suffixed variants.
          # Strip a trailing -fabric/-forge/-neoforge/-quilt for a "base" pattern.
          BASE_NAME=$(echo "$NAME" | sed -E 's/-(fabric|forge|neoforge|quilt)$//')

          FOUND=0
          while IFS= read -r jar; do
            base=$(basename "$jar")
            case "$base" in
              *-sources.jar|*-dev.jar|*-dev-shadow.jar|*-shadow.jar|*-shadow-dev.jar|*-transformProductionFabric.jar|*-transformProductionForge.jar|*-transformProductionNeoForge.jar)
                echo "Skipping intermediate: $base"
                continue
                ;;
            esac
            echo "Collecting: $jar"
            cp "$jar" collected-jars/
            FOUND=$((FOUND+1))
          done < <(find . -path "*/build/libs/*.jar" \
            -not -path "*/.gradle/*" \
            2>/dev/null | grep -E "/(${NAME}|${BASE_NAME}(-(fabric|forge|neoforge|quilt))?)[-_].*${VERSION}.*\.jar$" || true)

          # Fallback: root build/libs
          if [ "$FOUND" -eq 0 ]; then
            ROOT_JAR="build/libs/${NAME}-${VERSION}.jar"
            if [ -f "$ROOT_JAR" ]; then
              cp "$ROOT_JAR" collected-jars/
              FOUND=1
            fi
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "::error::No matching jars found for ${NAME} ${VERSION}"
            echo "Available jars:"
            find . -path "*/build/libs/*.jar" -not -path "*/.gradle/*" 2>/dev/null || true
            exit 1
          fi

          echo "Collected $FOUND jar(s):"
          ls -la collected-jars/

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod
          path: collected-jars/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download mod artifact
        uses: actions/download-artifact@v4
        with:
          name: minecraft-mod
          path: ./release-artifacts/

      - name: Create release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          files: ./release-artifacts/*.jar
