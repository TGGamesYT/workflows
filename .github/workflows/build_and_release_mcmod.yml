name: Build Minecraft Mod

on:
  workflow_call:

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      name: ${{ steps.mod_info.outputs.name }}
      version: ${{ steps.mod_info.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
      multiloader: ${{ steps.detect.outputs.multiloader }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify this is a Minecraft mod
        id: detect
        run: |
          # Search for mod loader manifests in both single-loader (src/main/resources/...)
          # and multi-loader (<loader>/src/main/resources/...) layouts.
          MANIFESTS=$(find . -maxdepth 5 \
            \( -name "fabric.mod.json" \
            -o -name "quilt.mod.json" \
            -o -name "mods.toml" \
            -o -name "neoforge.mods.toml" \) \
            -not -path "*/build/*" \
            -not -path "*/.gradle/*" \
            -not -path "*/run/*" \
            2>/dev/null)

          if [ -z "$MANIFESTS" ]; then
            echo "::error::This does not appear to be a Minecraft mod."
            echo "No loader manifest found anywhere in the project."
            exit 1
          fi

          echo "Found manifests:"
          echo "$MANIFESTS"

          # Detect multi-loader: any manifest in a subproject like fabric/, forge/, neoforge/, quilt/
          MULTILOADER="false"
          while IFS= read -r m; do
            # Strip leading ./
            rel="${m#./}"
            top="${rel%%/*}"
            case "$top" in
              fabric|forge|neoforge|quilt|fabric-loader)
                MULTILOADER="true"
                break
                ;;
            esac
          done <<< "$MANIFESTS"

          echo "multiloader=$MULTILOADER" >> $GITHUB_OUTPUT
          if [ "$MULTILOADER" = "true" ]; then
            echo "Detected multi-loader mod project"
          else
            echo "Detected single-loader mod project"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Read mod info from gradle files
        id: mod_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          extract_key() {
            local field="$1"
            local file="$2"
            grep -E "^[[:space:]]*${field}[[:space:]]*=" "$file" \
              | head -n1 \
              | sed -E "s/^[[:space:]]*${field}[[:space:]]*=[[:space:]]*(project\.)?([A-Za-z_][A-Za-z0-9_]*).*/\2/"
          }

          # Try root build.gradle first, then any subproject's
          GRADLE_FILE=""
          for f in build.gradle build.gradle.kts \
                   common/build.gradle common/build.gradle.kts \
                   fabric/build.gradle fabric/build.gradle.kts \
                   forge/build.gradle forge/build.gradle.kts \
                   neoforge/build.gradle neoforge/build.gradle.kts; do
            if [ -f "$f" ]; then
              # Prefer one that actually defines version + archivesName
              if grep -qE "^[[:space:]]*version[[:space:]]*=" "$f" 2>/dev/null; then
                GRADLE_FILE="$f"
                break
              fi
            fi
          done

          if [ -z "$GRADLE_FILE" ]; then
            echo "::error::Could not find a build.gradle defining version"
            exit 1
          fi

          echo "Using gradle file: $GRADLE_FILE"

          VERSION_KEY=$(extract_key "version" "$GRADLE_FILE")
          NAME_KEY=$(extract_key "archivesName" "$GRADLE_FILE")
          [ -z "$VERSION_KEY" ] && VERSION_KEY="mod_version"
          [ -z "$NAME_KEY" ] && NAME_KEY="archives_base_name"

          BASE_VERSION=$(grep "^${VERSION_KEY}[[:space:]]*=" gradle.properties | cut -d'=' -f2 | tr -d ' \r')
          NAME=$(grep "^${NAME_KEY}[[:space:]]*=" gradle.properties | cut -d'=' -f2 | tr -d ' \r')

          if [ -z "$NAME" ] || [ -z "$BASE_VERSION" ]; then
            echo "::error::Failed to resolve mod name/version"
            echo "  NAME='$NAME' (key=$NAME_KEY)"
            echo "  VERSION='$BASE_VERSION' (key=$VERSION_KEY)"
            exit 1
          fi

          echo "Base version: $BASE_VERSION"
          echo "Mod name: $NAME"

          # Find a free version: try BASE_VERSION first, then BASE_VERSION.1, .2, ...
          VERSION="$BASE_VERSION"
          i=1
          while gh release view "$VERSION" >/dev/null 2>&1; do
            VERSION="${BASE_VERSION}.${i}"
            i=$((i+1))
          done

          echo "Resolved free version: $VERSION"

          if [ "$VERSION" != "$BASE_VERSION" ]; then
            echo "Bumping ${VERSION_KEY} in gradle.properties: $BASE_VERSION -> $VERSION"
            sed -i -E "s|^(${VERSION_KEY}[[:space:]]*=[[:space:]]*).*|\1${VERSION}|" gradle.properties
          fi

          echo "version_key=$VERSION_KEY" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: echo "tag=${{ steps.mod_info.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Read Gradle version from wrapper
        id: gradle_ver
        run: |
          FALLBACK="9.2.1"
          PROPS="gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$PROPS" ]; then
            VER=$(grep "^distributionUrl" "$PROPS" | sed -E 's/.*gradle-([0-9]+\.[0-9]+(\.[0-9]+)?)-.*/\1/')
            [ -z "$VER" ] && VER="$FALLBACK"
          else
            VER="$FALLBACK"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Using Gradle $VER"

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: ${{ steps.gradle_ver.outputs.version }}

      - name: Build mod
        run: gradle build

      - name: Collect built jars
        id: jars
        run: |
          NAME="${{ steps.mod_info.outputs.name }}"
          VERSION="${{ steps.mod_info.outputs.version }}"
          MULTI="${{ steps.detect.outputs.multiloader }}"

          mkdir -p collected-jars

          # Find all jars matching the mod name + version, across all build/libs/ dirs.
          # Skip *-sources.jar, *-dev.jar, *-shadow.jar (intermediate/dev artifacts).
          FOUND=0
          while IFS= read -r jar; do
            base=$(basename "$jar")
            case "$base" in
              *-sources.jar|*-dev.jar|*-dev-shadow.jar|*-shadow.jar|*-transformProductionFabric.jar|*-transformProductionForge.jar|*-transformProductionNeoForge.jar)
                echo "Skipping intermediate: $base"
                continue
                ;;
            esac
            echo "Collecting: $jar"
            cp "$jar" collected-jars/
            FOUND=$((FOUND+1))
          done < <(find . -path "*/build/libs/*.jar" \
            -not -path "*/.gradle/*" \
            2>/dev/null | grep -E "/${NAME}[-_].*${VERSION}.*\.jar$" || true)

          # Fallback: if nothing matched the name/version pattern, try root build/libs only
          if [ "$FOUND" -eq 0 ]; then
            ROOT_JAR="build/libs/${NAME}-${VERSION}.jar"
            if [ -f "$ROOT_JAR" ]; then
              cp "$ROOT_JAR" collected-jars/
              FOUND=1
            fi
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "::error::No matching jars found for ${NAME} ${VERSION}"
            echo "Available jars:"
            find . -path "*/build/libs/*.jar" -not -path "*/.gradle/*" 2>/dev/null || true
            exit 1
          fi

          echo "Collected $FOUND jar(s):"
          ls -la collected-jars/

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod
          path: collected-jars/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download mod artifact
        uses: actions/download-artifact@v4
        with:
          name: minecraft-mod
          path: ./release-artifacts/

      - name: Create release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          files: ./release-artifacts/*.jar
